version: "3.8"

services:
  unlimited-ai:
    build: .
    container_name: unlimited-ai
    restart: unless-stopped
    ports:
      - "11436:11436"
    environment:
      - PORT=11436
      - PUTER_AUTH_TOKEN=${PUTER_AUTH_TOKEN:-}
      - NODE_ENV=production
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:11436/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
