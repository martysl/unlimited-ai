<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puter Model Emulator</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #1f2933; }
    .container { max-width: 840px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
    h1 { margin: 0 0 6px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .muted { color: #627384; font-size: 14px; margin: 0; }
    .section { margin-top: 18px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], select { width: 100%; padding: 11px 12px; border: 1px solid #d9e1ec; border-radius: 10px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #4a9eff; box-shadow: 0 0 0 3px rgba(74,158,255,0.15); }
    .search-dropdown { position: relative; width: 100%; }
    .dropdown-menu { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid #d9e1ec; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); max-height: 260px; overflow-y: auto; padding: 6px 0; z-index: 10; display: none; }
    .dropdown-menu.open { display: block; }
    .dropdown-item { padding: 10px 12px; cursor: pointer; font-size: 14px; }
    .dropdown-item:hover { background: #f3f7ff; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > *:first-child { flex: 1; }
    button { border: none; border-radius: 10px; padding: 11px 16px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .primary { background: #4a9eff; color: white; }
    .secondary { background: #eef2f7; color: #1f2933; }
    .danger { background: #e35d6a; color: white; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .endpoint { background: #f3f7ff; border: 1px solid #d9e7ff; padding: 12px 14px; border-radius: 10px; font-family: monospace; font-size: 13px; word-break: break-all; }
    .status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #f8fafc; border: 1px solid #e5ecf3; border-radius: 10px; margin-top: 22px; }
    .indicator { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; font-weight: 600; }
    .indicator .dot { width: 10px; height: 10px; border-radius: 50%; }
    .online { background: #e8f7ef; color: #1b6e34; }
    .online .dot { background: #22c55e; }
    .offline { background: #fdf2f2; color: #b42318; }
    .offline .dot { background: #f75555; }
    .icon-button { background: #eef2f7; color: #1f2933; width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; }
    .message { flex: 1; color: #1f2933; font-size: 13px; min-height: 18px; }

    /* Custom model list */
    .model-list { list-style: none; padding: 0; margin: 0; }
    .model-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid #e5ecf3; border-radius: 10px; margin-bottom: 8px; background: #fafcfe; }
    .model-item .model-name { font-weight: 600; min-width: 140px; }
    .model-item .model-arrow { color: #627384; font-size: 13px; }
    .model-item .model-puter { color: #4a9eff; font-size: 13px; }
    .model-item .model-actions { margin-left: auto; display: flex; gap: 6px; }
    .model-item .model-actions button { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

    /* Add model form */
    .add-model-form { display: flex; gap: 10px; align-items: flex-end; padding: 14px; background: #f3f7ff; border-radius: 10px; margin-top: 10px; }
    .add-model-form .field { flex: 1; }
    .add-model-form label { font-size: 13px; margin-bottom: 4px; }

    /* API key section */
    .api-key-row { display: flex; gap: 10px; align-items: center; }
    .api-key-row input { flex: 1; font-family: monospace; }
    .api-key-row button { white-space: nowrap; }
    .copy-btn { background: #eef2f7; color: #1f2933; padding: 11px 14px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Puter Local Model Emulator</h1>
      <p class="muted">Configure the OpenAI-compatible endpoint backed by Puter AI.</p>
    </header>

    <div class="section">
      <h2>API Key</h2>
      <p class="muted">Used for Authorization header on all /v1/ endpoints.</p>
      <div class="api-key-row">
        <input type="text" id="api-key-input" placeholder="sk-puter-123" autocomplete="off">
        <button id="save-apikey-btn" class="primary">Save</button>
        <button id="copy-apikey-btn" class="copy-btn" title="Copy">📋</button>
      </div>
    </div>

    <div class="section">
      <h2>Custom Models</h2>
      <p class="muted">Add models with your own names. All custom models are always active.</p>
      <ul id="model-list" class="model-list"></ul>
      <div class="add-model-form" id="add-model-form">
        <div class="field">
          <label>Your Model Name</label>
          <input type="text" id="custom-model-name" placeholder="e.g. my-gpt-4o">
        </div>
        <div class="field">
          <label>Puter Model</label>
          <div class="search-dropdown">
            <input type="text" id="custom-puter-model" autocomplete="off" placeholder="Select a Puter model...">
            <div id="puter-models-list" class="dropdown-menu"></div>
          </div>
        </div>
        <button id="add-model-btn" class="primary">Add</button>
      </div>
    </div>

    <div class="status-bar">
      <div id="puter-indicator" class="indicator offline">
        <span class="dot"></span>
        <span class="indicator-text">Puter Offline</span>
      </div>
      <button id="refresh-health" class="icon-button" title="Refresh status">⟳</button>
      <div id="status-message" class="message"></div>
    </div>
  </div>

  <script>
    const modelListEl = document.getElementById('model-list');
    const customNameInput = document.getElementById('custom-model-name');
    const puterModelInput = document.getElementById('custom-puter-model');
    const puterModelList = document.getElementById('puter-models-list');
    const addModelBtn = document.getElementById('add-model-btn');
    const indicatorEl = document.getElementById('puter-indicator');
    const indicatorText = indicatorEl.querySelector('.indicator-text');
    const refreshHealthBtn = document.getElementById('refresh-health');
    const statusMessage = document.getElementById('status-message');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveApiKeyBtn = document.getElementById('save-apikey-btn');
    const copyApiKeyBtn = document.getElementById('copy-apikey-btn');

    let puterOnline = false;
    let models = [];
    let customModels = [];
    let currentApiKey = '';

    function setMessage(text) {
      statusMessage.textContent = text || '';
    }

    function setIndicator(online) {
      puterOnline = online;
      indicatorEl.classList.toggle('online', online);
      indicatorEl.classList.toggle('offline', !online);
      indicatorText.textContent = online ? 'Puter Online' : 'Puter Offline';
    }

    // -----------------------------------------------------------------------
    // Puter model search dropdown
    // -----------------------------------------------------------------------

    function getFilteredModels(query = '') {
      const lower = query.trim().toLowerCase();
      if (!lower) return models;
      return models.filter(m => (m.label || m.id).toLowerCase().includes(lower) || m.id.toLowerCase().includes(lower));
    }

    function renderDropdown(listEl, options, onSelect) {
      listEl.innerHTML = '';
      options.forEach(option => {
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        item.textContent = option.label || option.id;
        item.addEventListener('click', () => {
          onSelect(option);
          listEl.classList.remove('open');
        });
        listEl.appendChild(item);
      });
      if (options.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'dropdown-item';
        empty.textContent = 'No matches';
        empty.style.color = '#627384';
        empty.style.cursor = 'default';
        listEl.appendChild(empty);
      }
    }

    function setupSearchDropdown(inputEl, listEl, getOptions, onSelect) {
      let open = false;
      function openMenu() { listEl.classList.add('open'); open = true; }
      function closeMenu() { listEl.classList.remove('open'); open = false; }
      function refreshOptions() { renderDropdown(listEl, getOptions(inputEl.value), onSelect); }

      inputEl.addEventListener('input', () => { refreshOptions(); openMenu(); });
      inputEl.addEventListener('click', (e) => {
        if (open) closeMenu(); else { refreshOptions(); openMenu(); }
        e.stopPropagation();
      });
      listEl.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('click', () => { if (open) closeMenu(); });
      return { refreshOptions, closeMenu };
    }

    const puterModelDropdown = setupSearchDropdown(
      puterModelInput,
      puterModelList,
      (q) => getFilteredModels(q),
      (opt) => { puterModelInput.value = opt.id; }
    );

    // -----------------------------------------------------------------------
    // Custom model CRUD
    // -----------------------------------------------------------------------

    function renderCustomModels() {
      modelListEl.innerHTML = '';
      if (customModels.length === 0) {
        modelListEl.innerHTML = '<li style="color:#627384;padding:12px;text-align:center;">No custom models yet. Add one below.</li>';
        return;
      }
      customModels.forEach(cm => {
        const li = document.createElement('li');
        li.className = 'model-item';
        li.innerHTML = `
          <span class="model-name">${escHtml(cm.name)}</span>
          <span class="model-arrow">→</span>
          <span class="model-puter">${escHtml(cm.puterModel)}</span>
          <span class="model-actions">
            <button class="secondary" onclick="editModel('${cm.id}')">Edit</button>
            <button class="danger" onclick="deleteModel('${cm.id}')">Delete</button>
          </span>
        `;
        modelListEl.appendChild(li);
      });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function addCustomModel() {
      const name = customNameInput.value.trim();
      const puterModel = puterModelInput.value.trim();
      if (!name) return setMessage('Model name is required.');
      if (!puterModel) return setMessage('Puter model is required.');

      addModelBtn.disabled = true;
      try {
        const res = await fetch('/models/custom', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, puterModel })
        });
        const data = await res.json();
        if (data.success) {
          customModels.push(data.model);
          renderCustomModels();
          customNameInput.value = '';
          puterModelInput.value = '';
          setMessage(`Model "${name}" added.`);
        } else {
          setMessage(data.error || 'Failed to add model.');
        }
      } catch (err) {
        setMessage(err.message);
      } finally {
        addModelBtn.disabled = false;
      }
    }

    window.editModel = async function(id) {
      const cm = customModels.find(m => m.id === id);
      if (!cm) return;
      const newName = prompt('Model name:', cm.name);
      if (!newName) return;
      const newPuter = prompt('Puter model:', cm.puterModel);
      if (!newPuter) return;

      const res = await fetch(`/models/custom/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName.trim(), puterModel: newPuter.trim() })
      });
      const data = await res.json();
      if (data.success) {
        const idx = customModels.findIndex(m => m.id === id);
        customModels[idx] = data.model;
        renderCustomModels();
        setMessage(`Model updated.`);
      } else {
        setMessage(data.error || 'Failed to update model.');
      }
    };

    window.deleteModel = async function(id) {
      if (!confirm('Delete this model?')) return;
      const res = await fetch(`/models/custom/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        customModels = customModels.filter(m => m.id !== id);
        renderCustomModels();
        setMessage('Model deleted.');
      } else {
        setMessage(data.error || 'Failed to delete model.');
      }
    };

    // -----------------------------------------------------------------------
    // Fetch state & init
    // -----------------------------------------------------------------------

    async function fetchState(force = false) {
      const res = await fetch(`/config/state${force ? '?force=true' : ''}`);
      if (!res.ok) throw new Error('Failed to load state');
      return res.json();
    }

    async function refreshHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        setIndicator(data.online === true);
        setMessage(data.message || 'Health checked.');
      } catch (err) {
        setIndicator(false);
        setMessage('Unable to reach Puter: ' + err.message);
      }
    }

    async function refreshModels(force = false) {
      try {
        const res = await fetch(`/models${force ? '?force=true' : ''}`);
        const data = await res.json();
        models = data.models || [];
        puterModelDropdown.refreshOptions();
        setIndicator(data.puterOnline !== false);
      } catch (err) {
        setMessage('Failed to load models: ' + err.message);
      }
    }

    async function init() {
      try {
        const state = await fetchState();
        customModels = state.customModels || [];
        models = state.models || [];
        currentApiKey = state.config?.apiKey || 'sk-puter-123';
        apiKeyInput.value = currentApiKey;
        renderCustomModels();
        puterModelDropdown.refreshOptions();
        setIndicator(state.puterOnline !== false);
        setMessage('Ready.');
        await refreshHealth();
      } catch (err) {
        setMessage('Failed to load state: ' + err.message);
      }
    }

    async function saveApiKey() {
      const newKey = apiKeyInput.value.trim();
      if (!newKey) return setMessage('API key cannot be empty.');
      saveApiKeyBtn.disabled = true;
      try {
        const res = await fetch('/config/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: newKey })
        });
        const data = await res.json();
        if (data.success) {
          currentApiKey = newKey;
          setMessage('API key updated.');
        } else {
          setMessage(data.error || 'Failed to update API key.');
        }
      } catch (err) {
        setMessage(err.message);
      } finally {
        saveApiKeyBtn.disabled = false;
      }
    }

    function copyApiKey() {
      navigator.clipboard.writeText(apiKeyInput.value).then(() => {
        setMessage('API key copied to clipboard.');
      }).catch(() => {
        apiKeyInput.select();
        setMessage('Select the key and copy manually.');
      });
    }

    addModelBtn.addEventListener('click', addCustomModel);
    refreshHealthBtn.addEventListener('click', refreshHealth);
    saveApiKeyBtn.addEventListener('click', saveApiKey);
    copyApiKeyBtn.addEventListener('click', copyApiKey);

    init();
  </script>
</body>
</html>
